<div style="padding: 20px; display: flex; gap: 20px; flex-wrap: wrap;">
  <!-- Normal Textareas -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <h3 style="margin: 0;">Normal Textarea</h3>
    
    <!-- Placeholder -->
    <div class="textarea-container">
      <label>Description</label>
      <textarea placeholder="Enter a description..."></textarea>
      <span class="hint">This is a hint text to help user.</span>
    </div>

    <!-- With Value -->
    <div class="textarea-container">
      <label>Description</label>
      <textarea>A little about the company and the team that you'll be working with.</textarea>
      <span class="hint">This is a hint text to help user.</span>
    </div>

    <!-- Disabled -->
    <div class="textarea-container">
      <label>Description</label>
      <textarea placeholder="Enter a description..." disabled></textarea>
      <span class="hint">This is a hint text to help user.</span>
    </div>
  </div>

  <!-- Danger Textareas -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <h3 style="margin: 0;">Danger Textarea</h3>
    
    <!-- Placeholder -->
    <div class="textarea-danger">
      <label>Description</label>
      <textarea placeholder="Enter a description..."></textarea>
      <span class="hint">This is an error message.</span>
    </div>

    <!-- With Value -->
    <div class="textarea-danger">
      <label>Description</label>
      <textarea>A little about the company and the team that you'll be working with.</textarea>
      <span class="hint">This is an error message.</span>
    </div>
  </div>
</div>
